# Intégration continue : build de l'application Hublot
# Déclenché à chaque push et pull request sur main.
# Valide que l'application compile (prérequis au déploiement Netlify).

name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Tests
        run: npm run test:run

      - name: Build
        run: npm run build
