server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Redirection HTTPS (décommenter en production avec certificat SSL)
    # return 301 https://$server_name$request_uri;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Cache pour les assets statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Protection des fichiers sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(json|env|log|sql|db)$ {
        # Bloquer l'accès direct aux fichiers JSON sensibles
        deny all;
        access_log off;
        log_not_found off;
    }

    # Rate limiting pour protéger contre les attaques
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # Authentification HTTP Basic (à configurer avec htpasswd)
    # Décommenter et configurer en production
    # auth_basic "Accès restreint - DIRM Méditerranée";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # Gestion des routes SPA (React Router)
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        
        # Headers de sécurité renforcés
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        
        # Content Security Policy stricte
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
        
        # HSTS (décommenter en production avec HTTPS)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Désactiver les logs pour les fichiers statiques
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Bloquer les méthodes HTTP non autorisées
    if ($request_method !~ ^(GET|HEAD|POST)$ ) {
        return 405;
    }
}

